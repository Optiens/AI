name: Auto Blog Post

on:
  schedule:
    # 月・水・金 JST 9:03 (UTC 0:03)
    - cron: '3 0 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          pip install google-genai pillow

      - name: Collect existing articles
        run: |
          # 既存記事一覧をファイルに書き出し（環境変数のHEREDOC問題を回避）
          echo "" > /tmp/existing_articles.txt
          for f in src/content/blog/*.md; do
            slug=$(basename "$f" .md)
            title=$(grep '^title:' "$f" | head -1 | sed "s/^title: *'\\(.*\\)'/\\1/")
            category=$(grep '^category:' "$f" | head -1 | sed "s/^category: *'\\(.*\\)'/\\1/")
            echo "- [$category] $title (slug: $slug)" >> /tmp/existing_articles.txt
          done
          echo "=== Existing articles ==="
          cat /tmp/existing_articles.txt

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set in repository secrets"
            exit 1
          fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::warning::GEMINI_API_KEY is not set — images will be skipped"
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXISTING=$(cat /tmp/existing_articles.txt)
          claude -p "
          ブログ記事を自動生成してください。以下の手順で実行:

          【重複防止】以下は既存記事の一覧です。これらと同じテーマ・同じスラッグの記事は絶対に作成しないでください:
          ${EXISTING}

          1. 上記の既存記事と重複しないテーマを選定
             カテゴリローテーション: agriculture, technology, AI, social, announcement
             既存記事で最も少ないカテゴリを優先的に選ぶ
          2. スラッグ名も既存と重複しないことを確認
          3. .claude/skills/write-blog-article.md の手順に従い2000-3000字の記事を執筆
          4. ファクトチェック: 統計データの出典確認、CLAUDE.md禁止表現チェック
          5. scripts/generate-blog.py でアイキャッチ画像を生成
          6. src/content/blog/{slug}.md と public/images/blog/{slug}.webp を保存
          7. npx astro build でビルド確認

          重要:
          - CLAUDE.mdの禁止事項を厳守
          - ワサビは除外（地元に大規模栽培あり）
          - 収穫まで長期間かかる品目は除外
          - 画像生成に失敗した場合はimageフィールドを省略して記事のみ公開
          - ファイルは必ずWriteツールで書き込むこと
          " --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm*),Bash(npx*),Bash(python*),Bash(git*),WebSearch,WebFetch,Agent"

      - name: Verify files were created
        run: |
          echo "=== New/modified files in src/content/blog/ ==="
          git status --short src/content/blog/ public/images/blog/
          if git status --short src/content/blog/ public/images/blog/ | grep -q .; then
            echo "✓ New blog files detected"
          else
            echo "::warning::No new blog files were created by Claude Code"
          fi

      - name: Build check
        run: npx astro build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ public/images/blog/
          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "blog: auto-generated post $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
